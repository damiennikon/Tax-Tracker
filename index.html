<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tax Tracker PWA</title>
    
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <header>
        <h1>Tax Tracker</h1>
    </header>

    <main>
        <section id="trip-section" class="card">
            <h2>Log a Trip</h2>
            <form id="trip-form">
                <label>Start Odometer:</label>
                <input type="number" id="start-odo" required>

                <label>End Odometer:</label>
                <input type="number" id="end-odo" required>

                <div class="checkbox-group">
                    <input type="checkbox" id="has-toll">
                    <label for="has-toll">Paid a toll?</label>
                </div>

                <div id="toll-amount-container" style="display: none;">
                    <label>Toll Amount ($):</label>
                    <input type="number" step="0.01" id="toll-amount">
                </div>

                <button type="submit">Save Trip</button>
            </form>

            <button type="button" id="btn-view-trips" style="width: 100%; margin-top: 20px; background-color: #17a2b8;">🚗 View Saved Trips</button>
        </section>

        <section id="receipt-section" class="card">
            <h2>Upload Receipt</h2>
            <form id="receipt-form">
                <label>Date of Purchase:</label>
                <input type="date" id="purchase-date" required>

                <label>Merchant (e.g., Uber, Secure Parking):</label>
                <input type="text" id="merchant" required>

                <label>Amount ($):</label>
                <input type="number" step="0.01" id="amount" required>

                <label>Category:</label>
                <select id="category" required>
                    <option value="Work Purchase">Work Purchase</option>
                    <option value="Postage">Postage</option>
                    <option value="Parking">Parking</option>
                </select>

                <label>Attach Receipt / Invoice:</label>
                
                <div style="display: flex; gap: 10px; margin-top: 10px;">
                    <button type="button" id="btn-camera" style="margin-top: 0; background-color: #28a745;">📷 Camera</button>
                    <button type="button" id="btn-file" style="margin-top: 0; background-color: #6c757d;">📁 File / PDF</button>
                </div>

                <input type="file" id="file-input" style="display:none;" required>
                <div id="file-name-display" style="text-align: center; margin-top: 15px; font-weight: bold; color: #555;">No file chosen</div>

                <script>
                    document.getElementById('btn-camera').onclick = function() {
                        const input = document.getElementById('file-input');
                        input.accept = "image/*"; 
                        input.setAttribute("capture", "environment"); 
                        input.click();
                    };

                    document.getElementById('btn-file').onclick = function() {
                        const input = document.getElementById('file-input');
                        input.accept = "image/*,application/pdf";
                        input.removeAttribute("capture"); 
                        input.click();
                    };

                    document.getElementById('file-input').onchange = function(e) {
                        const display = document.getElementById('file-name-display');
                        display.innerText = e.target.files[0] ? e.target.files[0].name : "No file chosen";
                    };
                </script>

                <button type="submit">Upload & Save</button>
            </form>

            <button type="button" id="btn-view-receipts" style="width: 100%; margin-top: 20px; background-color: #17a2b8;">📄 View Saved Receipts</button>
        </section>

        <div id="receipt-modal" style="display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; overflow: auto; background-color: rgba(0,0,0,0.6);">
            <div style="background-color: #fff; margin: 20% auto; padding: 20px; border-radius: 12px; width: 85%; max-width: 400px; position: relative; box-shadow: 0 4px 20px rgba(0,0,0,0.2);">
                <span id="close-modal" style="position: absolute; right: 20px; top: 15px; font-size: 28px; font-weight: bold; cursor: pointer; color: #aaa;">&times;</span>
                <h2 style="margin-top: 0; color: #333;">Saved Receipts</h2>
                <div id="receipt-date-list" style="display: flex; flex-direction: column; gap: 12px; margin-top: 20px; max-height: 60vh; overflow-y: auto;">
                </div>
            </div>
        </div>

        <div id="trip-modal" style="display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; overflow: auto; background-color: rgba(0,0,0,0.6);">
            <div style="background-color: #fff; margin: 20% auto; padding: 20px; border-radius: 12px; width: 85%; max-width: 400px; position: relative; box-shadow: 0 4px 20px rgba(0,0,0,0.2);">
                <span id="close-trip-modal" style="position: absolute; right: 20px; top: 15px; font-size: 28px; font-weight: bold; cursor: pointer; color: #aaa;">&times;</span>
                <h2 style="margin-top: 0; color: #333;">Saved Trips</h2>
                <div id="trip-list" style="display: flex; flex-direction: column; gap: 12px; margin-top: 20px; max-height: 60vh; overflow-y: auto;">
                </div>
            </div>
        </div>

    </main>

    <script src="app.js?v=6"></script>

    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then(reg => console.log('Service Worker registered!'))
                    .catch(err => console.error('Service Worker failed: ', err));
            });
        }
    </script>
</body>
</html>
